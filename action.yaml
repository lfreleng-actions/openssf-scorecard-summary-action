# openssf-scorecard-summary-action
name: '📄 OpenSSF Scorecard Summary'
description: 'Provides OpenSSF summary output containing report URL'

inputs:
  repository_owner:
    description: 'Repository owner (optional, auto-detected if not provided)'
    required: false
    default: ''
  repository_name:
    description: 'Repository name (optional, auto-detected if not provided)'
    required: false
    default: ''
  github_token:
    # yamllint disable-line rule:line-length
    description: 'GitHub token for API access (optional, improves metadata accuracy)'
    required: false
    default: ''

outputs:
  scorecard_url:
    description: 'URL to the OpenSSF Scorecard results'
    value: ${{ steps.generate-url.outputs.url }}

runs:
  using: 'composite'
  steps:
    - name: 'Repository metadata'
      id: repository-metadata
      # yamllint disable-line rule:line-length
      uses: lfreleng-actions/repository-metadata-action@61e837ecf6a21ef991c14991b43560f592a50a24 # v0.2.3
      with:
        github_token: ${{ inputs.github_token }}

    - name: 'Generate Scorecard URL'
      id: generate-url
      shell: bash
      env:
        INPUT_REPOSITORY_OWNER: ${{ inputs.repository_owner }}
        INPUT_REPOSITORY_NAME: ${{ inputs.repository_name }}
        # yamllint disable-line rule:line-length
        METADATA_OWNER: ${{ steps.repository-metadata.outputs.repository_owner }}
        METADATA_NAME: ${{ steps.repository-metadata.outputs.repository_name }}
      run: |
        # Generate scorecard URL
        if [ -n "$INPUT_REPOSITORY_OWNER" ] && \
           [ -n "$INPUT_REPOSITORY_NAME" ]; then
          owner="$INPUT_REPOSITORY_OWNER"
          repo="$INPUT_REPOSITORY_NAME"
        else
          owner="$METADATA_OWNER"
          repo="$METADATA_NAME"
        fi

        url="https://scorecard.dev/viewer/?uri=github.com/${owner}/${repo}"
        echo "url=${url}" >> "$GITHUB_OUTPUT"
        echo "Generated scorecard URL: ${url}"

    - name: 'Print summary/job Output'
      shell: bash
      env:
        SCORECARD_URL: ${{ steps.generate-url.outputs.url }}
      # yamllint disable rule:line-length
      run: |
        # Print summary/job output
        echo '## 🔐 OpenSSF Scorecard Results' >> "$GITHUB_STEP_SUMMARY"
        echo "🔗 $SCORECARD_URL" >> "$GITHUB_STEP_SUMMARY"
